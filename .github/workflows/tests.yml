name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v5

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.4"
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Sync dependencies
      run: uv sync --frozen

    - name: Run non-network tests with pytest
      run: uv run --no-sync pytest -v -m "not network" --cov=arlmet --junitxml=junit.xml -o junit_family=legacy

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && !always() }}
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && !always() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  test-network:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.4"
        enable-cache: true
        python-version: '3.11'

    - name: Sync dependencies
      run: uv sync --frozen

    - name: Run network tests with pytest
      run: uv run --no-sync pytest -v -m network
